variables:
  GITLAB_BASE_URL: "gitlab.com"
  RUNNER_TAG: k8s-arm
  CI_CD_DOCKER_IMAGE_NAME: "registry.${GITLAB_BASE_URL}/from-the-lamp/infra/docker-images/cicd-arm"
  CI_CD_DOCKER_IMAGE_VERSION: "78bf436c"
  REGISTRY_HOST: "${CI_REGISTRY}"
  REGISTRY_USER: "${CI_REGISTRY_USER}"
  REGISTRY_PASSWORD: "${CI_REGISTRY_PASSWORD}"
  DOCKER_IMAGE_NAME: "${CI_REGISTRY_IMAGE}"
  DOCKER_IMAGE_TAG: "${CI_COMMIT_SHORT_SHA}"
  DOCKER_BUILD_CONTEXT: "${CI_PROJECT_DIR}"
  DOCKER_FILE_PATH: "Dockerfile"
  KUBE_CONFIG: "${KUBECONFIG_BASE64}"
  K8S_NAMESPACE: ""
  HELM_INTERNAL_REPO: "true"
  HELM_INTERNAL_REPO_ID: "40582099"
  HELM_CHART_CHANNEL: "stable"
  HELM_CHART_NAME: "base"
  HELM_REPO_NAME: "infra"
  HELM_REPO_USER: "gitlab-ci-token"
  HELM_REPO_PASS: "${CI_JOB_TOKEN}"
  HELM_REPO_URL: " ${CI_API_V4_URL}/projects/${HELM_INTERNAL_REPO_ID}/packages/helm/${HELM_CHART_CHANNEL}"
  HELM_RELEASE_NAME: "${CI_PROJECT_NAME}"
  HELM_CHART_VERSION: "0.1.14"
  HELM_VALUES_FILE: "values.yml"
  HELM_TIMEOUT: "1m30s"
  HELM_ADDITIONAL_SETTINGS: ""
  TF_VAR_gitlab_token: "${CI_JOB_TOKEN}"
  ARGOCD_HOST: "argocd.from-the-lamp.work"
  ARGOCD_APP_PARAMS: |
    - name: global.image.name
      value: ${DOCKER_IMAGE_NAME}
    - name: global.image.tag
      value: ${DOCKER_IMAGE_TAG}
    - name: global.version
      value: ${DOCKER_IMAGE_TAG}
