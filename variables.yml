variables:
  CI_CD_DOCKER_IMAGE_NAME: "registry.gitlab.com/infra154/docker-images/cicd"
  CI_CD_DOCKER_IMAGE_VERSION: "27d458f3"
  REGISTRY_HOST: "${CI_REGISTRY}"
  REGISTRY_USER: "${CI_REGISTRY_USER}"
  REGISTRY_PASSWORD: "${CI_REGISTRY_PASSWORD}"
  DOCKER_IMAGE_NAME: "${CI_REGISTRY_IMAGE}"
  DOCKER_IMAGE_TAG: "${CI_COMMIT_SHORT_SHA}"
  DOCKER_BUILD_CONTEXT: "${CI_PROJECT_DIR}"
  DOCKER_FILE_PATH: "Dockerfile"
  KUBECONFIG_BASE64: "${KUBECONFIG_BASE64}"
  HELM_CHART_NAME: "${CI_PROJECT_NAME}-${CI_COMMIT_TAG}"
  HELM_CHART_CHANNEL: "stable"
  HELM_REPO_NAME: "neuraloom-helm-charts"
  HELM_REPO_USER: "gitlab-ci-token"
  HELM_REPO_PASS: "${CI_JOB_TOKEN}"
  HELM_INTERNAL_REPO: "true"
  HELM_INTERNAL_REPO_ID: "40582099"
  HELM_REPO: "infra-helm-charts ${CI_API_V4_URL}/projects/${HELM_INTERNAL_REPO_ID}/packages/helm/stable"
  HELM_RELEASE_NAME: "${CI_PROJECT_NAME}"
  HELM_CHART_VERSION: "0.0.2"
  HELM_VALUES_FILE: "values.yml"
  HELM_TIMEOUT: "1m30s"
  HELM_ADDITIONAL_SETTINGS: ""
