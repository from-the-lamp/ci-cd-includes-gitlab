include:
  - local: variables.yml

.deploy:
  stage: deploy
  image: ${CI_CD_DOCKER_IMAGE_NAME}:${CI_CD_DOCKER_IMAGE_VERSION}
  variables:
    DESTINATION_CLUSTER_NAME: "in-cluster"
    HELM_VALUES_BRANCH: "main"
  before_script:
  - export HELM_RELEASE_NAME=$(echo $HELM_RELEASE_NAME | tr _ -)
  script:
  - |
    cat <<EOF | tee /dev/stderr | argocd app create --upsert --grpc-web \
    --server ${ARGOCD_HOST} --auth-token ${ARGOCD_TOKEN} \
    --file -
    apiVersion: argoproj.io/v1alpha1
    kind: Application
    metadata:
      name: ${K8S_NAMESPACE}-${HELM_RELEASE_NAME}
      namespace: infra
      finalizers:
      - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
      - chart: base
        helm:
          releaseName: ${HELM_RELEASE_NAME}
          parameters:
    $(echo "$ARGOCD_APP_PARAMS" | awk '{ print "      " $0 }')
          valueFiles:
          - \$values/values.yml
        repoURL: https://${GITLAB_BASE_URL}/api/v4/projects/${HELM_INTERNAL_REPO_ID}/packages/helm/${HELM_CHART_CHANNEL}
        targetRevision: ${HELM_CHART_VERSION}
      - ref: values
        repoURL: https://${CI_DEPLOY_USER}:${CI_DEPLOY_PASSWORD}@${GITLAB_BASE_URL}/${CI_PROJECT_PATH}.git
        targetRevision: ${HELM_VALUES_BRANCH}
      destination:
        name: ${DESTINATION_CLUSTER_NAME}
        namespace: ${K8S_NAMESPACE}
      syncPolicy:
        automated:
          prune: true 
          selfHeal: true
      ignoreDifferences:
      - group: cert-manager.io
        kind: Certificate
        jsonPointers:
        - /spec/duration
        - /spec/renewBefore
    EOF
  tags: 
  - ${RUNNER_TAG}
