include:
  - local: variables.yml

.build:
  stage: Build
  variables:
    DOCKER_IMAGE_TAG: "${ARCH}-${CI_COMMIT_SHORT_SHA}"
  image:
    name: gcr.io/kaniko-project/executor:v1.19.2-debug
    entrypoint: [""]
  before_script:
    - export DOCKER_IMAGE_TAG=${CI_COMMIT_SHA::8} 
  script:
    - /kaniko/executor 
      --context $DOCKER_BUILD_CONTEXT 
      --dockerfile $CI_PROJECT_DIR/$DOCKER_FILE_PATH 
      --destination $DOCKER_IMAGE_NAME:$DOCKER_IMAGE_TAG
      --cache=true
      $BUILD_ARGS
      $BUILD_ADDITION
  tags: 
  - $RUNNER_TAG
