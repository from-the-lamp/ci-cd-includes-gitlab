include:
  - local: variables.yml

.build:
  stage: build
  variables:
    DOCKER_IMAGE_TAG: "${ARCH}-${CI_COMMIT_SHORT_SHA}"
    KUBERNETES_NODE_SELECTOR_ARCH: "kubernetes.io/arch=${ARCH}"
    KANIKO_IMAGE_TAG: v1.19.2-debug
  image:
    name: gcr.io/kaniko-project/executor:${KANIKO_IMAGE_TAG}
    entrypoint: [""]
  script:
    - /kaniko/executor 
      --context $DOCKER_BUILD_CONTEXT 
      --dockerfile $CI_PROJECT_DIR/$DOCKER_FILE_PATH 
      --destination $DOCKER_IMAGE_NAME:$DOCKER_IMAGE_TAG
      --cache=true
      $BUILD_ARGS
      $BUILD_ADDITION
  tags: 
  - $RUNNER_TAG
