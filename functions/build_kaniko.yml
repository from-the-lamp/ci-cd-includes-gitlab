include:
  - local: variables.yml

.build:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.9.1-debug
    entrypoint: [""]
  before_script:
    - |-
      if [ "$BUILD_ARM64" == "true" ]; then
        export ARM_ARGS="--customPlatform=linux/arm64/v8 '--build-arg opts=CGO_ENABLED=0 GOARCH=arm64'"
      fi
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"${REGISTRY_HOST}\":{\"auth\":\"$(printf "%s:%s" "${REGISTRY_USER}" "${REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor 
      --context $DOCKER_BUILD_CONTEXT 
      --dockerfile $CI_PROJECT_DIR/$DOCKER_FILE_PATH 
      --destination $DOCKER_IMAGE_NAME:$DOCKER_IMAGE_TAG
      --destination $DOCKER_IMAGE_NAME:latest
      --cache=true
      $ARM_ARGS
      $BUILD_ARGS
      $BUILD_ADDITION
  tags: 
  - $BUILD_RUNNER_TAG
