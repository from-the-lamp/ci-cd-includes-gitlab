include:
  - local: variables.yml

.deploy:
  stage: deploy
  image: ${CI_CD_DOCKER_IMAGE_NAME}:${CI_CD_DOCKER_IMAGE_VERSION}
  before_script:
    - export HELM_RELEASE_NAME=$(echo $HELM_RELEASE_NAME | tr _ -)
  script:
  - argocd login $ARGOCD_HOST --username $ARGOCD_USERNAME --password $ARGOCD_PASSWORD --grpc-web
  - argocd app set argo/$HELM_RELEASE_NAME -p image.tag=$DOCKER_IMAGE_TAG
  tags: 
  - $RUNNER_TAG
