include:
  - local: variables.yml

.kube-score:
  stage: .post
  image: 
    name: zegl/kube-score:latest
    entrypoint: ["/bin/sh", "-c"]
  script:
    - |
      kube-score score manifest.yaml \
        --ignore-test pod-networkpolicy \
        --ignore-test statefulset-has-poddisruptionbudget \
        --ignore-test deployment-has-poddisruptionbudget
