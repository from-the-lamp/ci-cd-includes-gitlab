
include:
  - local: variables.yml

.create:
  stage: deploy
  image: ${CI_CD_DOCKER_IMAGE_NAME}:${CI_CD_DOCKER_IMAGE_VERSION}
  variables:
    SYNC_POLICY: automated
    APP_FILE_PATH: ""
  script:
  - |
    argocd app create --core --upsert \
    --file ${APP_FILE_PATH}
  tags: 
  - $RUNNER_TAG
  rules:
    - changes: 
      - ${APP_FILE_PATH}
