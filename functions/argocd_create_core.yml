
include:
  - local: variables.yml

.create:
  stage: deploy
  image: ${CI_CD_DOCKER_IMAGE_NAME}:${CI_CD_DOCKER_IMAGE_VERSION}
  variables:
    SYNC_POLICY: automated
    APP_FILE_PATH: ""
    APP_TYPE: "app"
  before_script:
  - mkdir $HOME/.kube
  - |
    TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
    CA_PATH="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
    KUBERNETES_API="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}"
    cat <<EOF > $HOME/.kube/config
    apiVersion: v1
    kind: Config
    clusters:
    - name: default
      cluster:
        certificate-authority: ${CA_PATH}
        server: ${KUBERNETES_API}
    contexts:
    - name: kubernetes
      context:
        cluster: default
        namespace: argocd
        user: default
    current-context: kubernetes
    users:
    - name: default
      user:
        token: ${TOKEN}
    EOF
  - export KUBECONFIG=$HOME/.kube/config
  script:
  - |
    if [ "$APP_TYPE" == "app" ]; then
        argocd app create --core --upsert --file ${APP_FILE_PATH}
    elif [ "$APP_TYPE" == "appset" ]; then
        argocd appset create ${APP_FILE_PATH} --upsert
    else
        echo "Unknown APP_TYPE: $APP_TYPE"
        exit 1
    fi
  tags: 
  - $RUNNER_TAG
  rules:
    - changes: 
      - ${APP_FILE_PATH}
