include:
  - local: functions/terraform.yml

.plan:
  extends: .terraform
  stage: plan
  script:
    - task plan
  artifacts:
    paths:
      - ${ENV}/${DIR}/plan.out
    expire_in: 10 min
  rules:
  - changes:
     - ${ENV}/${DIR}/*
    when: always

.apply:
  extends: .terraform
  stage: apply
  variables:
     TERRAFORM_ACTION: "apply -auto-approve plan.out"
  script:
    - task apply
  rules:
  - if: '$CI_COMMIT_REF_NAME == "master" || $CI_COMMIT_REF_NAME == "main"'
    changes:
     - ${ENV}/${DIR}/*
    when: manual
