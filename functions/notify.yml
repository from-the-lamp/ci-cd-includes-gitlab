include:
  - local: variables.yml

.notify:
  stage: .post
  image: ${CI_CD_DOCKER_IMAGE_NAME}:${CI_CD_DOCKER_IMAGE_VERSION}
  before_script:
    - export HELM_RELEASE_NAME=$(echo $HELM_RELEASE_NAME | tr _ -)
  script:
  - |
    curl -X POST \
      -H "Authorization: Bearer $API_SECRET" \
      -H "Content-Type: multipart/form-data" \
      -F "parse_mode=MarkdownV2" \
      -F "message=$TEXT" \
      ${CURL_URL}
  tags: 
  - $DEPLOY_RUNNER_TAG

