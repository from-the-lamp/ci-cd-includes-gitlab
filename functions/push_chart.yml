include:
  - local: 'variables.yml'

stages:
  - push
  
.push:
  stage: push
  image: ${CI_CD_DOCKER_IMAGE_NAME}:${CI_CD_DOCKER_IMAGE_VERSION}
  script:
    - helm repo add --username ${HELM_REPO_USER} --password ${HELM_REPO_PASS} ${HELM_REPO_NAME} ${HELM_REPO_URL}
    - helm cm-push ./${FOLDER} ${HELM_REPO_NAME}
  after_script:
    - echo HELM_REPO_URL=${HELM_REPO_URL}"
  rules:
    - changes: 
      - ${FOLDER}/Chart.yaml
  tags: 
  - $BUILD_RUNNER_TAG
