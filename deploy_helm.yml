include:
  - local: functions/install_helm_chart.yml

Prod:Deploy:
  stage: deploy
  extends: .deploy
  variables:
    KUBECONFIG_BASE64: ${prod_KUBECONFIG_BASE64}
    HELM_VALUES_FILE: "values.yml"
  environment:
    name: prod
    url: https://from-the-lamp.com
  rules:
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
