include:
  - local: functions/install_helm_chart.yml

Stage:Deploy:
  stage: deploy
  extends: .deploy
  environment:
    name: stage
    url: https://stage.from-the-lamp.com
  rules:
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

Prod:Deploy:
  stage: deploy
  extends: .deploy
  environment:
    name: prod
    url: https://from-the-lamp.com
  rules:
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    exists:
      - $HELM_PROD_VALUES_FILE
